name: 小项目标准CI/CD
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出完整代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 调试打印目录，确认文件存在（跑通后可删掉）
      - name: 查看目录结构
        run: |
          pwd
          ls -la

      # 2. 初始化Node环境
      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 前端打包构建
      - name: 前端打包构建
        run: |
          cd frontend
          npm install
          npm run build

      # 4. 后端安装依赖
      - name: 后端安装依赖
        run: |
          cd backend
          npm install

      # 5. SCP全量传输代码到服务器临时目录
      - name: 传输代码至服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/sunday/admin_new"
          strip_components: 0

      # 6. 远程备份+替换+重启服务
      - name: 线上部署&重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            # 加载 nvm 环境（根据服务器实际配置调整路径）
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

            # 备份旧版本，带时间戳
            mv /sunday/admin /sunday/admin_bak_$(date +%Y%m%d_%H%M%S) || true
            # 新版本更名上线
            mv /sunday/admin_new /sunday/admin

            # 线上仅安装生产依赖
            cd /sunday/admin/backend
            npm ci --production
            
            # 检查 PM2 进程是否存在，存在则重启，不存在则启动
            if pm2 describe backend-api > /dev/null 2>&1; then
              pm2 restart backend-api
            else
              pm2 start server.js --name backend-api
            fi
