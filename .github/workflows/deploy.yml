name: 小项目标准CI/CD
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置Node.js
      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 前端打包构建
      - name: 前端打包构建
        run: |
          cd frontend
          npm install
          npm run build

      # 4. 部署到服务器
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            # 加载nvm环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 创建目录结构
            mkdir -p /sunday/todo-frontend
            mkdir -p /sunday/todo-backend

            set +e

      # 5. 传输前端构建产物
      - name: 传输前端代码
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build"
          target: "/sunday/todo-frontend"

      # 6. 使用rsync传输后端代码（避免scp嵌套目录问题）
      - name: 传输后端代码
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rsync -az --delete /github/workspace/backend/ /sunday/todo-backend/
            ls -la /sunday/todo-backend/

      # 8. 安装后端依赖
      - name: 安装后端依赖
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            cd /sunday/todo-backend
            pwd
            ls -la
            npm install --production
            echo "=== 依赖安装完成 ==="

      # 9. 启动PM2服务
      - name: 启动PM2服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            cd /sunday/todo-backend
            pwd
            ls -la
            
            # 临时禁用错误退出，避免 pm2 describe 返回非零导致脚本失败
            set +e
            pm2 describe todo-backend > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "进程已存在，重启..."
              pm2 restart todo-backend
            else
              echo "进程不存在，启动新进程..."
              pm2 start server.js --name todo-backend
            fi
            set -e
            
            pm2 list
            echo "✅ 部署完成！"