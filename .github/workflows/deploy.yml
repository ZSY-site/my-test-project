name: 标准完整自动部署流水线
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：官方Action，在CI云端检出代码（仅CI打包用，不上线）
      - name: 检出代码到CI运行环境
        uses: actions/checkout@v4

      # 步骤2：SSH登录业务服务器执行部署
      - name: SSH远程部署服务端
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            TARGET_DIR="/sunday/admin"
            GIT_REMOTE="https://github.com/ZSY-site/my-test-project.git"

            # 自动容错：目录不存在就clone；存在无.git就初始化绑定远程
            if [ ! -d "$TARGET_DIR" ]; then
              mkdir -p $(dirname "$TARGET_DIR")
              cd $(dirname "$TARGET_DIR")
              git clone "$GIT_REMOTE" $(basename "$TARGET_DIR")
            fi

            cd "$TARGET_DIR"
            if [ ! -d ".git" ]; then
              git init
              git remote add origin "$GIT_REMOTE"
              git pull origin main --allow-unrelated-histories
            fi

            # 正常迭代更新
            git pull origin main
            cd server
            npm ci --production
            pm2 restart backend-api
            cd ..
            npm ci
            npm run build
            echo "✅ 部署全部完成"