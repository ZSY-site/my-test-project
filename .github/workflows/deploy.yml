name: 全栈项目自动部署云服务器
on:
  push:
    branches: [ main ]

jobs:
  deploy_task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      # 载入SSH私钥
      - name: 加载SSH私钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 远程SSH执行命令
      - name: 测试SSH连通
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no root@$SSH_HOST "echo '✅ 连通成功'"