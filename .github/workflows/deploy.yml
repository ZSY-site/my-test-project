name: 小项目标准CI/CD
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出完整代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 调试打印目录，确认文件存在（跑通后可删掉）
      - name: 查看目录结构
        run: |
          pwd
          ls -la

      # 2. 初始化Node环境
      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 前端打包构建
      - name: 前端打包构建
        run: |
          cd frontend
          npm install
          npm run build

      # 4. 传输前端构建产物到服务器 Nginx 目录
      - name: 传输前端代码至服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build"
          target: "/var/www/html/todo-app"
          strip_components: 0

      # 5. 传输后端代码到服务器
      - name: 传输后端代码至服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend"
          target: "/sunday/todo-backend"
          strip_components: 0

      # 6. 远程部署配置
      - name: 线上部署&配置
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            # 加载 nvm 环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 安装后端生产依赖
            cd /sunday/todo-backend
            npm ci --production

            # 配置 Nginx 反向代理
            cat > /etc/nginx/sites-available/todo-app << 'EOF'
server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或服务器IP

    # 前端静态文件
    location / {
        root /var/www/html/todo-app;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://localhost:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
EOF

            # 创建软链接启用配置
            ln -sf /etc/nginx/sites-available/todo-app /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default

            # 检查 Nginx 配置并重启
            nginx -t && systemctl restart nginx

            # 启动/重启后端服务
            set +e
            echo "=== 检查 PM2 进程 ==="
            which pm2
            pm2 --version
            pm2 describe todo-backend > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "进程存在，重启中..."
              pm2 restart todo-backend
            else
              echo "进程不存在，启动新进程..."
              pm2 start server.js --name todo-backend
            fi
            pm2 list
            set -e

            echo "✅ 部署完成！"
