name: 小项目标准CI/CD
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置Node.js
      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 前端打包构建
      - name: 前端打包构建
        run: |
          cd frontend
          npm install
          npm run build

      # 4. 部署到服务器
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            # 加载nvm环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 创建目录结构
            mkdir -p /sunday/todo-frontend
            mkdir -p /sunday/todo-backend

            set +e

      # 5. 传输前端构建产物
      - name: 传输前端代码
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build"
          target: "/sunday/todo-frontend"

      # 6. 传输后端代码
      - name: 传输后端代码
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend"
          target: "/sunday/todo-backend"
          strip_components: 1

      # 7. 安装依赖并启动服务
      - name: 安装依赖并启动服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            # 加载nvm环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 安装后端依赖
            cd /sunday/todo-backend
            npm install --production

            # 启动或重启PM2服务
            set +e
            pm2 describe todo-backend > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart todo-backend
            else
              pm2 start server.js --name todo-backend
            fi
            set -e

            echo "✅ 部署完成！"