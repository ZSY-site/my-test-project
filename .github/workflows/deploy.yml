name: 极简自动部署
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH密码登录+自动初始化Git
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            echo "🔍 服务器当前所在路径: $(pwd)"
            TARGET_DIR="/sunday/admin"
            # ========== 在这里改成你自己仓库真实HTTPS地址 ==========
            GIT_REMOTE_URL="https://github.com/你的用户名/你的仓库名.git"

            # 1. 判断项目目录是否存在
            if [ ! -d "${TARGET_DIR}" ]; then
              echo "❌ 目录不存在，自动创建目录并克隆完整仓库"
              mkdir -p ${TARGET_DIR}
              cd $(dirname ${TARGET_DIR})
              git clone ${GIT_REMOTE_URL} $(basename ${TARGET_DIR})
            fi

            # 进入项目目录
            cd "${TARGET_DIR}"
            echo "进入后路径: $(pwd)"

            # 2. 没有.git就自动初始化+绑定远程
            if [ ! -d ".git" ]; then
              echo "⚠️ 未检测到Git仓库，自动初始化并绑定远程仓库"
              git init
              git remote add origin ${GIT_REMOTE_URL}
              git pull origin main --allow-unrelated-histories
            fi

            # 3. 正常更新代码
            echo "【步骤2】git拉取最新代码"
            git pull origin main

            echo "【步骤3】进入后端server文件夹"
            cd server

            echo "【步骤4】后端安装生产依赖"
            npm ci --production

            echo "【步骤5】PM2重启后端服务"
            pm2 restart backend-api

            echo "【步骤6】切回前端根目录"
            cd ..

            echo "【步骤7】前端安装依赖"
            npm ci
            echo "【步骤8】前端打包"
            npm run build

            echo "✅ 全部部署执行成功"