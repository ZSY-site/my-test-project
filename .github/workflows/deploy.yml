name: 小项目标准CI/CD
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置Node.js
      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 前端打包构建
      - name: 前端打包构建
        run: |
          cd frontend
          npm install
          npm run build

      # 4. 部署到服务器
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            # 加载nvm环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 创建目录结构
            mkdir -p /sunday/todo-frontend
            mkdir -p /sunday/todo-backend

            set +e

      # 5. 传输前端构建产物
      - name: 传输前端代码
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build"
          target: "/sunday/todo-frontend"

      # 6. 传输后端代码
      - name: 传输后端代码
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend"
          target: "/sunday/todo-backend"
          strip_components: 1

      # 7. 安装依赖并启动服务
      - name: 安装依赖并启动服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            echo "=== 步骤1: 加载nvm环境 ==="
            export NVM_DIR="$HOME/.nvm"
            echo "NVM_DIR: $NVM_DIR"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              echo "找到nvm.sh，加载中..."
              . "$NVM_DIR/nvm.sh"
              echo "Node版本: $(node --version)"
              echo "npm版本: $(npm --version)"
            else
              echo "未找到nvm.sh"
            fi

            echo "=== 步骤2: 检查后端目录 ==="
            ls -la /sunday/todo-backend/

            echo "=== 步骤3: 安装后端依赖 ==="
            cd /sunday/todo-backend
            echo "当前目录: $(pwd)"
            npm install --production
            echo "npm install 退出码: $?"

            echo "=== 步骤4: 检查PM2 ==="
            which pm2
            echo "which pm2 退出码: $?"
            if command -v pm2 &> /dev/null; then
              pm2 --version
            else
              echo "PM2 未安装"
            fi
            
            set +e
            pm2 describe todo-backend > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "进程存在，重启中..."
              pm2 restart todo-backend
            else
              echo "进程不存在，启动新进程..."
              pm2 start server.js --name todo-backend
            fi
            
            echo "=== PM2进程列表 ==="
            pm2 list
            
            set -e

            echo "✅ 部署完成！"