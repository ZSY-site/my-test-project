name: 全栈项目自动部署云服务器
on:
  push:
    branches: [ main ]

jobs:
  deploy_task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 写入私钥到临时文件并授权权限
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_HOST }}
        run: |
          echo "$PRIVATE_KEY" > ~/server_id_rsa
          chmod 600 ~/server_id_rsa
          # 强制指定私钥文件登录
          ssh -i ~/server_id_rsa -o StrictHostKeyChecking=no root@$SERVER_IP "echo '✅ SSH连通测试成功'"